<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Secure Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="login-card" role="main">

    <!-- Lockout overlay -->
    <div class="lockout-overlay" id="lockoutOverlay" aria-live="assertive" role="alert">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <div id="lockCountdown">30</div>
      <p>Too many failed attempts.<br><strong>Account temporarily locked.</strong><br>Please wait before trying again.</p>
    </div>

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1>Secure Access</h1>
      <p>Sign in to your account</p>
    </div>

    <!-- Login Form -->
    <form id="loginForm" novalidate autocomplete="on" aria-label="Login form">

      <!-- Username Field -->
      <div class="field-group">
        <label class="field-label" for="uName">Username</label>
        <div class="input-wrapper">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <circle cx="12" cy="7" r="4"/>
            <path d="M2 21c0-4 4.5-7 10-7s10 3 10 7"/>
          </svg>
          <input
            id="uName"
            type="text"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            aria-required="true"
            aria-describedby="userError"
            spellcheck="false"
            autocorrect="off"
            autocapitalize="none"
            maxlength="60"
          />
        </div>
        <span class="field-error" id="userError" role="alert" aria-live="polite"></span>
      </div>

      <!-- Password Field -->
      <div class="field-group">
        <label class="field-label" for="userPassword">Password</label>
        <div class="input-wrapper">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            id="userPassword"
            type="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            aria-required="true"
            aria-describedby="passError"
            maxlength="128"
          />
          <button
            type="button"
            class="toggle-pass"
            id="togglePass"
            aria-label="Toggle password visibility"
            tabindex="0"
          >
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="passError" role="alert" aria-live="polite"></span>
      </div>

      <!-- Remember Me + Forgot Password -->
      <div class="form-meta">
        <label class="remember-me">
          <input type="checkbox" id="rememberMe" name="rememberMe" />
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link" id="forgotLink">Forgot password?</a>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn-login" id="btnLogin" aria-live="polite">
        <span class="btn-text">Sign In</span>
        <span class="btn-spinner" aria-hidden="true">
          <span class="spinner-ring"></span>
        </span>
      </button>

      <!-- Failed Attempts Warning -->
      <p class="attempts-warn" id="attemptsWarn" role="status" aria-live="polite"></p>

      <!-- Success / Error Status Message -->
      <div class="status-msg" id="statusMsg" role="alert" aria-live="assertive"></div>

    </form>

    <!-- Social Login -->
    <div class="divider"><span>or continue with</span></div>
    <div class="social-row">
      <button type="button" class="social-btn" onclick="socialLogin('Google')" aria-label="Sign in with Google">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button type="button" class="social-btn" onclick="socialLogin('GitHub')" aria-label="Sign in with GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
        </svg>
        GitHub
      </button>
    </div>

    <p class="signup-link">Don't have an account? <a href="#">Create one</a></p>

  </div>

  <script src="script.js"></script>
</body>
</html>
